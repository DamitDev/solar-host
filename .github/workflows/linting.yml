# Ruff lint — mirrors orchestrator PR checks (see damit-aiops/orchestrator).

name: Code Linting Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ruff-lint-check:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with Ruff
        run: ruff check .
