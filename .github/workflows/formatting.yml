# Black format check — mirrors orchestrator PR checks.

name: Code Formatting Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  black-format-check:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Black
        run: |
          python -m pip install --upgrade pip
          pip install black

      - name: Check formatting with Black
        run: black --check --diff --color .
